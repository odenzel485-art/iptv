name: Website Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1: Basic CI
  # ============================================
  test:
    name: Basic CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run a simple check
        run: echo "✅ Basic check passed!"

  # ============================================
  # JOB 2: HTML Validation
  # ============================================
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTML-Validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: html-validate "**/*.html" || echo "⚠️ HTML errors found!"
        continue-on-error: true

  # ============================================
  # JOB 3: Broken Link Checker
  # ============================================
  check-links:
    name: Check Broken Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start local server
        run: |
          npx serve -l 3000 &
          sleep 5

      - name: Check for broken links
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              execSync('npx broken-link-checker http://localhost:3000 --exclude=linkedin.com,twitter.com');
              console.log('✅ No broken links found!');
            } catch (error) {
              console.log('⚠️ Broken links detected!');
              process.exit(1);
            }

  # ============================================
  # JOB 4: Build Test
  # ============================================
  test-build:
    name: Test Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for build tool
        id: check-build
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check-build.outputs.has_package == 'true'
        run: npm ci

      - name: Run build
        if: steps.check-build.outputs.has_package == 'true'
        run: npm run build || echo "⚠️ No build script found, skipping..."

      - name: Check file sizes
        run: |
          echo "📊 File sizes:"
          find . -name "*.html" -o -name "*.css" -o -name "*.js" | xargs du -h 2>/dev/null | sort -hr || echo "No files found"

  # ============================================
  # JOB 5: Security Scan (FIXED)
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            function scanFile(filePath) {
              const content = fs.readFileSync(filePath, 'utf8');
              // Only check for REAL secret patterns, not common words
              const patterns = [
                // API keys in assignments: api_key = "value" or api_key:"value"
                /(?:api[_-]?key|api[_-]?secret|password|private[_-]?key|access[_-]?token|bearer\s+[a-zA-Z0-9_.-]+)\s*[:=]\s*['"][^'"]+['"]/i,
                // Stripe live keys
                /sk[-_]?live[-_]?[a-zA-Z0-9_-]{20,}/i,
                /pk[-_]?live[-_]?[a-zA-Z0-9_-]{20,}/i,
                // AWS keys
                /AKIA[0-9A-Z]{16}/i,
                /aws_secret_access_key\s*[:=]\s*['"]?[A-Za-z0-9/+=]{40}['"]?/i,
                // Private key headers
                /-----BEGIN RSA PRIVATE KEY-----/,
                /-----BEGIN OPENSSH PRIVATE KEY-----/,
                // Generic secret assignment (more strict)
                /['"](?:secret|token|password)['"]\s*[:=]\s*['"][^'"]{8,}['"]/i
              ];
              
              for (const pattern of patterns) {
                if (pattern.test(content)) {
                  console.log(`⚠️ Potential secret found in: ${filePath}`);
                  return true;
                }
              }
              return false;
            }

            function walkDir(dir) {
              const files = fs.readdirSync(dir);
              let found = false;
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stat = fs.statSync(fullPath);
                // Skip .git, node_modules, and other common folders
                if (stat.isDirectory() && !file.startsWith('.') && file !== 'node_modules' && file !== 'dist' && file !== 'build') {
                  if (walkDir(fullPath)) found = true;
                } else if (stat.isFile() && ['.js', '.html', '.css', '.json', '.env', '.yml', '.yaml'].includes(path.extname(file))) {
                  if (scanFile(fullPath)) found = true;
                }
              }
              return found;
            }

            const hasSecrets = walkDir('.');
            if (hasSecrets) {
              console.log('⚠️ Potential secrets found! Please review your code.');
              process.exit(1);
            } else {
              console.log('✅ No obvious secrets found.');
            }

  # ============================================
  # JOB 6: Final Status
  # ============================================
  final-status:
    name: Final Status
    runs-on: ubuntu-latest
    needs: [test, validate-html, check-links, test-build, security]
    if: always()
    
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" == "success" && 
                "${{ needs.validate-html.result }}" == "success" && 
                "${{ needs.check-links.result }}" == "success" && 
                "${{ needs.test-build.result }}" == "success" && 
                "${{ needs.security.result }}" == "success" ]]; then
            echo "✅ All tests passed!"
          else
            echo "❌ Some tests failed! Please review."
            exit 1
          fi
